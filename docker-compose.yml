name: rateme

services:
  dbserver:
    build: ./db
    container_name: rateme_db
    ports:
      - "3306:3306"
    networks:
      - rateme-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      retries: 10
      interval: 3s
      timeout: 30s

  springserver:
    build:
      context: .
      dockerfile: appServer/Dockerfile
    container_name: rateme_appserver
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      dbserver:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://dbserver:3306/swtp_rateme
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=60000
      - LOGGING_FILE_NAME=/logs/rateme.log
    volumes:
      - ./logs:/logs
    networks:
      - rateme-network
networks:
  rateme-network:
    name: rateme
    driver: bridge