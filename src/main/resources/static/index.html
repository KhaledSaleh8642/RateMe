<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>

    <title>RateMe</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
    <script src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<div id="image-modal" onclick="this.style.display='none'">
    <img id="image-modal-content" src="">
</div>
<body>
<div id="landing" class="landing">
    <h1>HS-KL Location-Bewertung</h1>
    <div class="landing-card">
        <h2>Willkommen</h2>
        <input type="text" id="login-username-inline" placeholder="Username" class="w3-input">
        <input type="password" id="login-password-inline" placeholder="Password" class="w3-input">
        <button id="login-button-inline" class="w3-button">Login</button>
        <p class="hint">Noch keinen Account?</p>
        <button id="register-button" class="w3-button register-btn">Registrieren</button>
    </div>
</div>

    <div id="welcome-bar" style="display: none;">
        Herzlich Willkommen <span id="welcome-name"></span>
        <button id="logout-button">Logout</button>
    </div>


    <button id="show-my-ratings" style="display: none;">Meine Bewertungen</button>
    <button id="show-map" style="display: none;">Location Bewerten</button>

    <div id="my-ratings" style="display: none;">
        <h2>Meine Bewertungen</h2>
        <table>
            <thead>
            <tr>
                <th>Datum</th>
                <th>Location</th>
                <th>Kommentar</th>
                <th>Bewertung</th>
                <th>Bild</th>
            </tr>
            </thead>
            <tbody id="my-ratings-body"></tbody>
        </table>
    </div>
    <div id="main-content">
        <div id="map"></div>

        <div id="poi-details" style="display: none;">
        <h2 id="poi-name"></h2>
        <p>Telefon: <span id="poi-phone"></span></p>
        <p>Locationart: <span id="poi-amenity"></span></p>

        <table id="ratings-table">
            <thead>
            <tr>
                <th>Datum</th>
                <th>Name</th>
                <th>Kommentar</th>
                <th>Bewertung</th>
                <th>Bild</th>
            </tr>
            </thead>
            <tbody id="ratings-body">

            </tbody>
        </table>
        <h3>Bewertung abgeben</h3>
        <textarea id="rating-txt" placeholder="Kommentar"></textarea>
        <br>
            <div id="star-picker">
                <span data-value="1">☆</span>
                <span data-value="2">☆</span>
                <span data-value="3">☆</span>
                <span data-value="4">☆</span>
                <span data-value="5">☆</span>
            </div>
            <input type="hidden" id="rating-grade" value="0">

        <br>
        <button id="submit-rating">Absenden</button> <input type="file" id="rating-image" accept="image/*">
    </div>
    </div>

    <div id="register-form" class="w3-modal">
        <div class="w3-modal-content w3-card-4" style="max-width: 500px;">
            <div class="w3-container">
            <span onclick="document.getElementById('register-form').style.display='none'"
                  class="w3-button w3-display-topright">×</span>
                <h2>Register</h2>
                <input type="text" id="reg-username" placeholder="Username" class="w3-input">
                <input type="password" id="reg-password" placeholder="Password" class="w3-input">
                <input type="text" id="reg-email" placeholder="Email" class="w3-input">
                <input type="text" id="reg-firstname" placeholder="Vorname" class="w3-input">
                <input type="text" id="reg-lastname" placeholder="Nachname" class="w3-input">
                <input type="text" id="reg-street" placeholder="Straße" class="w3-input">
                <input type="text" id="reg-streetnr" placeholder="Hausnummer" class="w3-input">
                <input type="text" id="reg-zip" placeholder="PLZ" class="w3-input">
                <input type="text" id="reg-city" placeholder="Ort" class="w3-input">
                <button id="submit-register" class="w3-button w3-blue">Register</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
